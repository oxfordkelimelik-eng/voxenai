workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # App Store paketleri için sertifika ve profilleri çekiyoruz
          app-store-connect fetch-signing-files "com.voxenai.app" --type APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Initialize and Install Pods Safely
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install --repo-update && cd ..
      - name: Build iOS IPA (Manual Override)
        script: |
          # 1. Xcode projesini imzalama aramaya zorlamadan ham arşiv haline getiriyoruz:
          flutter build ios --release --no-codesign
          
          # 2. Arşivi Codemagic'in indirdiği resmi sertifikalarla paketleyip .ipa haline getiriyoruz:
          xcode-project package-app \
            --project ios/Runner.xcodeproj \
            --scheme Runner \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/iphoneos/*.ipa