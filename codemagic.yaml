workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Project Cleanup & Disable Automatic Signing
        script: |
          # 1. Eski ID'leri ve sürüm hatalarını zorla temizliyoruz
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.riseup.riseUp/com.voxenai.app/g' {} +
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.5/g' {} +
          
          # 2. EN KRİTİK SATIR: Xcode'un "Otomatik İmzalama" inadını zorla "Manuel"e çekiyoruz!
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' {} +
      - name: 2. Initialize Flutter & Pods
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install --repo-update && cd ..
      - name: 3. Fetch App Store Certificates
        script: |
          keychain initialize
          # İmzalama artık Manuel olduğu için sadece App Store (Dağıtım) profilini çekmemiz yeterli
          app-store-connect fetch-signing-files "com.voxenai.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 4. Build Release IPA
        script: |
          # Xcode artık Manuel modda olduğu için dışarıdan verdiğimiz sertifikayı itirazsız kabul edecek:
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/iphoneos/*.ipaa- build/ios/iphoneos/*.ipa