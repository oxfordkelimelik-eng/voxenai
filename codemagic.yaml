workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic panelinde tanımlanan App Store Connect API anahtarının adı.
      # Teams > Integrations > Developer Portal altında anahtari TAM OLARAK
      # "codemagic" adiyla kaydedin (veya buradaki adi kendi anahtarinizla eslestirin).
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        # Xcode projesindeki PRODUCT_BUNDLE_IDENTIFIER ile birebir aynı olmalı
        bundle_identifier: com.voxenai.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build ios --config-only --release
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Apply code signing profiles
        script: |
          # ios_signing bloğunun indirdiği sertifika/profilleri anahtarlığa yükler
          # ve ~/export_options.plist dosyasını üretir.
          xcode-project use-profiles
      - name: 4. Build release IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
