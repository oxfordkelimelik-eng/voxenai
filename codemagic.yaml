workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    # pub + CocoaPods önbelleği: her build'de bağımlılıkları sıfırdan indirmeyi azaltır.
    # Çıktıyı değiştirmez; yalnızca indirme süresini kısaltır.
    #
    # ios/Pods: Podfile.lock sabit olduğu sürece pod'ları yeniden İNDİRİP
    # açmaya gerek yok — 'pod install' önbellekten çok daha hızlı tamamlanır.
    # Podfile.lock değişirse CocoaPods farkı görüp gerekli pod'ları zaten
    # günceller, yani bayat kalma riski yok.
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        # Codemagic panelinde olusturmaniz gereken degisken grubu.
        # Icinde su GIZLI degiskenler olmali:
        #   ASC_PRIVATE_KEY = App Store Connect .p8 anahtarinin TAM icerigi
        #     (-----BEGIN PRIVATE KEY----- ... -----END PRIVATE KEY----- dahil)
        #   CERTIFICATE_PRIVATE_KEY = fetch-signing-files --create'in yeni
        #     dagitim sertifikasi URETIRKEN kullandigi RSA anahtari. Bu, ASC
        #     anahtariyla AYNI SEY DEGIL — olmadan "Cannot save Signing
        #     Certificates without certificate private key" hatasi alinir.
        - appstore
      vars:
        BUNDLE_ID: "com.voxenai.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        DEVELOPMENT_TEAM: "359SBFFXD9"
        # Bunlar gizli degil; API anahtarinin kimlik bilgileri.
        ASC_KEY_ID: "4VDG2LU8D7"
        ASC_ISSUER_ID: "e05cb8c9-c7c3-4830-b2f0-d821096f1528"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # --build-number: her Codemagic build'i benzersiz CFBundleVersion alsin
          # ki TestFlight "build numarasi zaten var" diye reddetmesin.
          flutter build ios --config-only --release --no-codesign \
            --build-number="$PROJECT_BUILD_NUMBER"
      - name: 2. Install CocoaPods dependencies
        script: |
          # Podfile.lock sabitken --repo-update gereksiz; yalnızca pod'ları kurar.
          cd ios && pod install
      - name: 3. Fetch stable signing files & apply
        script: |
          set -e
          keychain initialize
          # .p8 anahtarini araclarin okuyabilecegi dosyaya yaz.
          # %b: PEM literal "\n" ile saklaniyorsa gercek satir sonuna cevirir.
          KEY_FILE="$CM_BUILD_DIR/AuthKey.p8"
          printf '%b\n' "$ASC_PRIVATE_KEY" > "$KEY_FILE"
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "HATA: ASC_PRIVATE_KEY bos veya gecersiz."
            echo "Codemagic'te 'appstore' grubuna .p8 icerigini ASC_PRIVATE_KEY"
            echo "adiyla (secure) eklediginizden emin olun."
            exit 1
          fi
          # KARARLI App Store dagitim sertifikasi + app-store profili cek/kur.
          # ONEMLI: eskiden tam-otomatik imza, her uicu makinede YENI bir
          # "Apple Development" sertifikasi uretiyordu; bunlar hesapta birikip
          # "account already has a certificate ... private key not installed"
          # hatasina yol aciyordu. Bu akis, tek bir kararli DAGITIM sertifikasi
          # kullanir; gelistirme sertifikasi hic uretilmez.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$ASC_ISSUER_ID" \
            --key-id "$ASC_KEY_ID" \
            --private-key @file:"$KEY_FILE"
          keychain add-certificates
          xcode-project use-profiles
      - name: 4. Archive (manual, stable distribution cert)
        script: |
          set -e
          # Tek tam derleme burada yapilir. xcodebuild archive, Flutter'in
          # Xcode script'lerini (Dart derleme + native link) calistirir;
          # ayri bir "flutter build ios" adimi gereksiz tekrar derlemeydi.
          # use-profiles Runner hedefini manuel + app-store profiliyle
          # yapilandirdi; xcodebuild bunu okuyup arsivi dagitim sertifikasiyla
          # imzalar. Otomatik imza/gelistirme sertifikasi URETILMEZ.
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            archive
      - name: 5. Fix App.framework CFBundleIdentifier collision
        script: |
          set -e
          # TEShIS (onceki build log'u) kesin gosterdi: Flutter'in kendi
          # App.framework'u (CocoaPods degil, Flutter engine'i) Info.plist'inde
          # ana uygulamayla AYNI CFBundleIdentifier'i (com.voxenai.app) tasiyor.
          # Apple'in yeni App Store Connect ingestion dogrulamasi bunu artik
          # "CFBundleIdentifier Collision" olarak reddediyor.
          #
          # Bundle ID'yi degistirmek YETMEZ — framework'un KOD IMZASI da eski
          # identifier'i gomulu tutar ("Invalid Code Signature Identifier"
          # hatasi). Bu yuzden: 1) Info.plist'i yamala, 2) framework'u dagitim
          # sertifikasiyla, --identifier ile YENIDEN imzala. Bunu export'tan
          # ONCE, arsiv icinde yapiyoruz.
          NEW_ID="${BUNDLE_ID}.appframework"
          FW_DIR="$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework"
          FW_PLIST="$FW_DIR/Info.plist"
          if [ ! -f "$FW_PLIST" ]; then
            echo "HATA: App.framework/Info.plist bulunamadi: $FW_PLIST"
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $NEW_ID" "$FW_PLIST"
          echo "App.framework CFBundleIdentifier -> $NEW_ID"
          # Yeniden imzalamak icin dagitim sertifikasinin SHA-1 hash'ini
          # keychain'den al (fetch-signing-files kurdu). Hash, isimden daha
          # guvenilir bir imza kimligi.
          SIGN_HASH=$(security find-identity -v -p codesigning \
            | grep "Apple Distribution" | head -1 | awk '{print $2}')
          if [ -z "$SIGN_HASH" ]; then
            echo "HATA: keychain'de Apple Distribution sertifikasi bulunamadi."
            security find-identity -v -p codesigning
            exit 1
          fi
          echo "Yeniden imzalama hash: $SIGN_HASH"
          # --identifier: imza-ici tanimlayiciyi yeni bundle ID'ye esitle
          # (aksi halde "Invalid Code Signature Identifier" hatasi). Export'un
          # otomatik yeniden-imzalamasi bu identifier'i --preserve-metadata ile
          # koruyacak.
          codesign --force --sign "$SIGN_HASH" --identifier "$NEW_ID" \
            "$FW_DIR"
          echo "App.framework yeni identifier ile yeniden imzalandi."
      - name: 6. Export IPA (automatic signing via API key)
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$CM_BUILD_DIR/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
      - name: 7. Verify no duplicate CFBundleIdentifiers remain
        script: |
          set -e
          # Dogrulama: export edilen ipa'da BUNDLE_ID'yi birden fazla Info.plist
          # tasimiyor mu, kontrol et. Varsa build'i erken ve net bir hatayla
          # durdur (upload'un belirsiz sunucu hatasini beklemek yerine).
          UNZIP_DIR="$CM_BUILD_DIR/build/ios/ipa_inspect"
          rm -rf "$UNZIP_DIR" && mkdir -p "$UNZIP_DIR"
          unzip -q "$CM_BUILD_DIR"/build/ios/ipa/*.ipa -d "$UNZIP_DIR"
          COUNT=$(find "$UNZIP_DIR/Payload" -name "Info.plist" -exec sh -c \
            '/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$1" 2>/dev/null' _ {} \; \
            | grep -c "^${BUNDLE_ID}$" || true)
          echo "'$BUNDLE_ID' ile eslesen Info.plist sayisi: $COUNT (beklenen: 1)"
          if [ "$COUNT" -ne 1 ]; then
            echo "HATA: hala $COUNT adet Info.plist ayni CFBundleIdentifier'i tasiyor."
            find "$UNZIP_DIR/Payload" -name "Info.plist" | while read -r p; do
              id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$p" 2>/dev/null || echo "(yok)")
              echo "$id  <-  ${p#$UNZIP_DIR/}"
            done
            exit 1
          fi
      - name: 8. Upload to TestFlight
        script: |
          # NOT: 'set -e' YOK — publish'in cikis kodunu kendimiz yorumluyoruz.
          # Uretilen .ipa'yi App Store Connect'e yukler ve TestFlight'a koyar.
          #
          # Apple'in yukleme sunucusu, veri basariyla transfer edildikten sonra
          # bazen "durumu tamamlandi olarak isaretle" adiminda GECICI bir
          # HTTP 500 donduruyor; altool bunu gorunce cikis kodunu 1 yapiyor ama
          # yukleme FIILEN basarili ("UPLOAD SUCCEEDED with no errors"). Bu
          # sahte basarisizligi ele almak icin: ciktiyi yakala, "UPLOAD
          # SUCCEEDED" varsa basarili say; yoksa 3 kez'e kadar yeniden dene.
          # --max-find-build-wait: yukleme TAMAMLANDIKTAN sonra arac, Apple'in
          # binary'yi islemesini bekleyip "beta review'e gonder / test notu
          # yaz" gibi EK islemler yapmaya calisir. Bu bekleme varsayilan 10 dk
          # ve build suresini direkt sisiriyordu — halbuki bu adimin ciktisini
          # hicbir yerde kullanmiyoruz (beta review'e otomatik gondermiyoruz).
          # Kisa tutulunca arac birkac saniyede "henuz hazir degil" deyip
          # UYARIYLA (hata degil) devam ediyor; asil yukleme zaten tamamlanmis
          # oluyor, TestFlight'ta Apple kendi hizinda islemeye devam ediyor.
          upload_ipa() {
            app-store-connect publish \
              --path "$CM_BUILD_DIR/build/ios/ipa/*.ipa" \
              --testflight \
              --max-find-build-wait 60 \
              --issuer-id "$ASC_ISSUER_ID" \
              --key-id "$ASC_KEY_ID" \
              --private-key @file:"$CM_BUILD_DIR/AuthKey.p8" 2>&1 | tee "$CM_BUILD_DIR/publish.log"
            return "${PIPESTATUS[0]}"
          }
          for attempt in 1 2 3; do
            echo "== TestFlight yukleme denemesi $attempt =="
            if upload_ipa; then
              echo "Yukleme basarili (deneme $attempt)."
              exit 0
            fi
            # publish sifir-disi dondu — gercekten basarili mi (Apple 500'u) yoksa
            # gercek hata mi? Log'daki kesin basari isaretine bak.
            if grep -q "UPLOAD SUCCEEDED" "$CM_BUILD_DIR/publish.log"; then
              echo "altool sifir-disi dondu ama 'UPLOAD SUCCEEDED' var (gecici Apple 500). Basarili sayiliyor."
              exit 0
            fi
            echo "Yukleme deneme $attempt basarisiz; gercek hata olabilir, tekrar denenecek..."
            sleep 30
          done
          echo "HATA: 3 denemenin hepsinde yukleme basarisiz oldu."
          exit 1
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
