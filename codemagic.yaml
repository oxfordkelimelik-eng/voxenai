workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.voxenai.app" --type DEVELOPMENT --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Initialize and Recreate Flutter iOS Environment
        script: |
          flutter clean
          flutter pub get
          # Bu komut podhelper dahil tüm eksik bağımlılıkları Mac sunucusunda sıfırdan oluşturur
          flutter build ios --config-only
      - name: Build iOS IPA
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app