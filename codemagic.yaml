workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. ABSOLUTE FIX - Enforce Bundle ID & Target
        script: |
          # Mac sunucusunda projenin içine girip Rise Up'tan kalan eski ID'leri zorla VoxenAI'ye çeviriyoruz:
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/com.riseup.riseUp/com.voxenai.app/g' {} +
          # Sürümü de zorla 15.5'e kitliyoruz:
          find ios -type f -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.5/g' {} +
      - name: 2. Initialize Flutter & Pods
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install --repo-update && cd ..
      - name: 3. Code Signing (App Store)
        script: |
          keychain initialize
          # Tip parametresini kesin Apple formatı olan IOS_APP_STORE'a çekiyoruz
          app-store-connect fetch-signing-files "com.voxenai.app" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 4. Build Release IPA
        script: |
          # Profiller artık %100 eşleştiği için standart ve temiz bir flutter build başlatıyoruz:
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/iphoneos/*.ipa