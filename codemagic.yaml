workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic > Teams > Integrations > Developer Portal'daki anahtarin
      # REFERANS ADI (paneldeki adla birebir ayni). Bu, imzalama script'lerine
      # APP_STORE_CONNECT_* ortam degiskenlerini otomatik saglar.
      app_store_connect: voxenai
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.voxenai.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # Yalnizca pod install icin Generated.xcconfig uretir; imzalama
          # asagida kuruluyor, o yuzden burada --no-codesign.
          flutter build ios --config-only --release --no-codesign
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Build unsigned Flutter app
        script: |
          # Once Dart/Flutter kodunu imzasiz derliyoruz. ONEMLI: bu komut
          # projenin imza ayarlarini sifirladigi icin "use-profiles" MUTLAKA
          # bundan SONRA calismali; aksi halde profil ayari siliniyordu.
          flutter build ios --release --no-codesign
      - name: 4. Set up code signing (fetch + install profiles)
        script: |
          # environment.ios_signing bloğunun otomatik ön-kontrolü
          # "No matching profiles found" hatası veriyordu. Bunun yerine
          # profili gerekirse ureten script tabanli akisi kullaniyoruz.
          # use-profiles en sonda, boylece imza ayari flutter build ile
          # ezilmeden pbxproj'a yaziliyor.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 5. Archive & export signed IPA
        script: |
          # "flutter build ipa" kendi export mantiginda Flutter'in dahili
          # App.framework'une provisioning profile atamaya calisip hata
          # veriyordu. Bu yuzden arsiv+export'u Codemagic'in araci yapiyor.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
