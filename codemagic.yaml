workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.riseup.riseUp # Apple Developer panelindeki tam Bundle ID'nizi buraya yazın
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Initialize Flutter & Pods
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install --repo-update && cd ..
      - name: 2. Apply Code Signing Profiles
        script: |
          # KRİTİK ADIM: Üstteki ios_signing bloğunun indirdiği sertifikaları makinenin anahtarlığına yükler ve Xcode'a bağlar.
          xcode-project use-profiles
      - name: 3. Build Release IPA
        script: |
          # Sertifikalar artık sisteme enjekte edildiği için Xcode itirazsız derlemeyi tamamlar.
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/iphoneos/*.ipa