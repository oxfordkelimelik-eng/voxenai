workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic > Teams > Integrations > Developer Portal'daki anahtarin
      # REFERANS ADI (paneldeki adla birebir ayni). Bu, imzalama script'lerine
      # APP_STORE_CONNECT_* ortam degiskenlerini otomatik saglar.
      app_store_connect: voxenai
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.voxenai.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # Bu adim yalnizca pod install icin Generated.xcconfig uretir;
          # imzalama Adim 3'te kuruluyor. --no-codesign olmadan Flutter burada
          # (henuz sertifika yokken) "No valid code signing certificates" ile
          # dusuyordu.
          flutter build ios --config-only --release --no-codesign
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Set up code signing (fetch + install profiles)
        script: |
          # environment.ios_signing bloğunun otomatik ön-kontrolü
          # "No matching profiles found" hatası veriyordu. Bunun yerine
          # Workflow Editor'ün arka planda çalıştırdığı ve bu projede
          # başarıyla profil ÜRETEN script tabanlı akışı kullanıyoruz.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 4. Build unsigned Flutter app
        script: |
          # "flutter build ipa" kendi export mantığında Flutter'ın dahili
          # App.framework'üne provisioning profile atamaya çalışıp
          # "App.framework does not support provisioning profiles" hatası
          # veriyor. Bu yüzden Flutter'a sadece imzasız derleme yaptırıp
          # arşiv+export işini Codemagic'in xcode-project aracına bırakıyoruz.
          flutter build ios --release --no-codesign
      - name: 5. Archive & export signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
