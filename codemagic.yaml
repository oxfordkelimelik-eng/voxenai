workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.voxenai.app" --type APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Initialize and Install Pods Safely
        script: |
          flutter config --no-enable-swift-package-manager
          flutter clean
          flutter pub get
          flutter build ios --config-only
          cd ios && pod install --repo-update && cd ..
      - name: Build iOS IPA (Manual Override)
        script: |
          # Codemagic CLI'ın resmi güncel komutu ile hem Flutter'ı derliyor hem de IPA'yı paketliyoruz:
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/iphoneos/*.ipa