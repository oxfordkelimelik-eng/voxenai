workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic > Teams > Integrations > Developer Portal'daki anahtarin
      # REFERANS ADI. Paneldeki adla birebir ayni olmali (bosluk/harf dahil).
      app_store_connect: voxenai
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        # Xcode projesindeki PRODUCT_BUNDLE_IDENTIFIER ile birebir aynı olmalı
        bundle_identifier: com.voxenai.app
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build ios --config-only --release
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Apply code signing profiles
        script: |
          # ios_signing bloğunun indirdiği sertifika/profilleri anahtarlığa yükler
          # ve ~/export_options.plist dosyasını üretir.
          xcode-project use-profiles
      - name: 4. Build unsigned app (Flutter)
        script: |
          # Flutter'ın kendi "flutter build ipa" export mantığı, Flutter'ın
          # dahili App.framework'üne de manuel provisioning profile atamaya
          # çalışıp "App.framework does not support provisioning profiles"
          # hatası veriyor. Bu yüzden imzalamayı Flutter'a değil, aşağıdaki
          # adımda Codemagic'in kendi arşivleme/export aracına bırakıyoruz.
          flutter build ios --release --no-codesign
      - name: 5. Archive & export signed IPA (Codemagic)
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - "*.ipa"
      - /tmp/xcodebuild_logs/*.log
