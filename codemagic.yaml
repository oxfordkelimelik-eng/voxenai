workflows:
  ios-workflow:
    name: VoxenAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # Buradaki profil tipini APP_STORE veya DEVELOPMENT yapabilirsin, şimdilik otomatik üretiyoruz
          app-store-connect fetch-signing-files "com.voxenai.app" --type DEVELOPMENT --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Initialize and Recreate Flutter iOS Environment
        script: |
          flutter clean
          flutter pub get
          # SPM'i kapatıyoruz: flutter_secure_storage, google_mlkit_* ve
          # sign_in_with_apple henüz Swift Package Manager desteklemiyor —
          # karma SPM+CocoaPods durumu "Module not found" hatası veriyor.
          flutter config --no-enable-swift-package-manager
          flutter build ios --config-only
      - name: Build iOS IPA
        script: |
          # --release flagı ile Apple sertifikalarını tam uyumlu eşliyoruz
          flutter build ipa --release
    artifacts:
      - build/ios/iphoneos/*.ipa