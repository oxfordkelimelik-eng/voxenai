workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic > Teams > Integrations > Developer Portal'daki anahtarin
      # REFERANS ADI (paneldeki adla birebir ayni). Bu, imzalama script'lerine
      # APP_STORE_CONNECT_* ortam degiskenlerini otomatik saglar.
      app_store_connect: voxenai
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.voxenai.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # Yalnizca pod install icin Generated.xcconfig uretir; imzalama
          # asagida kuruluyor, o yuzden burada --no-codesign.
          flutter build ios --config-only --release --no-codesign
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Build unsigned Flutter app
        script: |
          # Once Dart/Flutter kodunu imzasiz derliyoruz. ONEMLI: bu komut
          # projenin imza ayarlarini sifirladigi icin "use-profiles" MUTLAKA
          # bundan SONRA calismali; aksi halde profil ayari siliniyordu.
          flutter build ios --release --no-codesign
      - name: 4. Set up code signing (fetch + install profiles)
        script: |
          # environment.ios_signing bloğunun otomatik ön-kontrolü
          # "No matching profiles found" hatası veriyordu. Bunun yerine
          # profili gerekirse ureten script tabanli akisi kullaniyoruz.
          # use-profiles en sonda, boylece imza ayari flutter build ile
          # ezilmeden pbxproj'a yaziliyor.
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: 5. Archive (manual signing)
        script: |
          # Arsivleme, use-profiles'in Runner hedefine yazdigi manuel imzayla
          # yapiliyor — bu asama sorunsuz calisiyor. "flutter build ipa" veya
          # "xcode-project build-ipa" yerine dogrudan xcodebuild kullaniyoruz
          # ki export'u ayri ve otomatik imzayla yapabilelim.
          set -e
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive"
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            archive
      - name: 6. Export IPA (automatic signing via API key)
        script: |
          # KRITIK: Manuel export, App.framework'e provisioning profile
          # atamaya calisip hata veriyordu (acik Flutter/Xcode hatasi).
          # Export'u OTOMATIK imzaya cevirip App Store Connect API anahtarini
          # dogrudan xcodebuild'e veriyoruz; boylece Xcode framework imzasini
          # kendisi dogru yonetir ve hata olusmaz.
          set -e
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive"
          KEY_FILE="$CM_BUILD_DIR/AuthKey.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_FILE" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
