workflows:
  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic > Teams > Integrations > Developer Portal'daki anahtarin
      # REFERANS ADI (paneldeki adla birebir ayni). Bu, build'e
      # APP_STORE_CONNECT_* ortam degiskenlerini otomatik saglar.
      app_store_connect: voxenai
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.voxenai.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        DEVELOPMENT_TEAM: "359SBFFXD9"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: 1. Get dependencies & generate iOS config
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # Yalnizca pod install icin Generated.xcconfig uretir; imza yok.
          flutter build ios --config-only --release --no-codesign
      - name: 2. Install CocoaPods dependencies
        script: |
          cd ios && pod install --repo-update
      - name: 3. Build unsigned Flutter app
        script: |
          flutter build ios --release --no-codesign
      - name: 4. Prepare keychain & App Store Connect API key
        script: |
          set -e
          # Xcode'un otomatik imza sirasinda uretecegi sertifikayi saklamasi
          # icin acik bir keychain hazirla.
          keychain initialize
          # API anahtarini xcodebuild'in okuyabilecegi .p8 dosyasina yaz.
          # %b: degisken PEM'i literal "\n" ile tutuyorsa bunlari gercek satir
          # sonlarina cevirir (aksi halde xcodebuild "invalidPEMDocument" verir).
          KEY_FILE="$CM_BUILD_DIR/AuthKey.p8"
          printf '%b\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          # Anahtari loga sizdirmadan gecerliligini dogrula.
          if ! grep -q "BEGIN PRIVATE KEY" "$KEY_FILE"; then
            echo "HATA: APP_STORE_CONNECT_PRIVATE_KEY gecerli bir .p8 uretmedi."
            echo "Codemagic entegrasyonunun private key'i ortama sagladigindan emin olun."
            exit 1
          fi
      - name: 5. Archive (automatic signing via API key)
        script: |
          # Manuel imza (use-profiles) bu projede Runner hedefine takim/profil
          # bilgisini kalici yazamiyordu ("requires a development team").
          # Bunun yerine TAM OTOMATIK imza kullaniyoruz: takim ve profil
          # dogrudan App Store Connect API anahtarindan cozuluyor, framework
          # imzalama sorunu da olusmuyor.
          set -e
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$CM_BUILD_DIR/AuthKey.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Automatic \
            archive
      - name: 6. Export IPA (automatic signing via API key)
        script: |
          set -e
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$CM_BUILD_DIR/AuthKey.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
