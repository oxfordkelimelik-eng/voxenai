name: rise_up
description: "AI-Powered Male Self-Improvement & Looksmaxxing Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Network
  dio: ^5.8.0+1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Media
  cached_network_image: ^3.4.1
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # Rehberli çekim — canlı yüz/vücut hizalama tespiti (ML Kit)
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_pose_detection: ^0.14.0

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.4
  fl_chart: ^0.71.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  crypto: ^3.0.6
  equatable: ^2.0.7
  dartz: ^0.10.1
  logger: ^2.5.0
  permission_handler: ^11.4.0
  path_provider: ^2.1.5

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  cloud_functions: ^6.3.3
  in_app_purchase: ^3.3.0

  # Bildirimler
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Android 8+ uyarlanabilir (adaptive) ikon: ön plan logo + arka plan ton
  # Arka plan, splash logosunun kenar rengiyle (#181218) eşleşir → dikişsiz.
  adaptive_icon_background: "#181218"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/dating/
    - assets/videos/

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf